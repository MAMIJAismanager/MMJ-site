name: Deploy MMJ Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      SOURCE_DATE_EPOCH: '1784378700'
      MMJ_BUILD_ID: mmj-github-pages-production
      MMJ_BUILD_ENVIRONMENT_CLASS: production
      NUXT_APP_BASE_URL: /
      NUXT_PUBLIC_MMJ_MEDIA_BASE_URL: https://media.mamajing.work

    steps:
      - name: Checkout full Git history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.16.0'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run approved lifecycle scripts
        run: npm rebuild

      - name: Generate static site
        run: npm run generate

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-24.04

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
