name: MMJ Continuity Readiness Claim
on:
  pull_request:
    paths:
      - 'generated/publication-readiness.claim.json'
      - 'trust/continuity-readiness-keys.json'
      - 'generated/public-release.promotion.json'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify:
    if: ${{ vars.MMJ_CONTINUITY_READINESS_ENFORCED == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.16.0'
          cache: npm
      - run: npm ci
      - run: npm run verify:mmj-05n-i-claim:production
