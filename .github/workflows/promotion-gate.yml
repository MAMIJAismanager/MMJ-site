name: public-promotion-gate

on:
  pull_request:
    paths:
      - generated/**
      - trust/**
  push:
    branches: [main]
    paths:
      - generated/**
      - trust/**

permissions:
  contents: read

jobs:
  promotion:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          path: candidate
          fetch-depth: 0
      - name: Checkout base
        if: github.event_name == 'pull_request'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.16.0'
      - name: Install
        working-directory: candidate
        run: npm ci
      - name: Signature
        working-directory: candidate
        run: npm run verify:public-promotion-signature
      - name: Software composition security
        working-directory: candidate
        run: npm run verify:mmj-05n-l-claim:production
      - run: npm run verify:mmj-05n-m-passport:production
      - name: Chain
        if: github.event_name == 'pull_request'
        working-directory: candidate
        run: node scripts/public-promotion-chain-verify.mjs --base-dir ../base --base-sha "${{ github.event.pull_request.base.sha }}"
      - name: Exact promotion diff
        if: github.event_name == 'pull_request'
        working-directory: candidate
        env:
          MMJ_PUBLIC_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
        run: node scripts/public-promotion-diff-gate.mjs --base-ref "${{ github.event.pull_request.base.sha }}" --base-dir ../base
      - name: Push exact diff
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        working-directory: candidate
        run: node scripts/public-promotion-diff-gate.mjs --base-ref "${{ github.event.before }}"
      - name: Push verification
        if: github.event_name == 'push'
        working-directory: candidate
        env:
          MMJ_PUBLIC_PUSH_BEFORE: ${{ github.event.before }}
        run: npm run verify:public-promotion-push
